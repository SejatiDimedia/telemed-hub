# =============================================================================
# TeleMedHub — Docker Compose (Local Development)
# =============================================================================
# Usage: docker-compose up --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API — TeleMedHub Go application
  # ---------------------------------------------------------------------------
  api:
    container_name: telemedhub_api
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_NAME: telemedhub
      HTTP_PORT: 8080
      LOG_LEVEL: debug
      DATABASE_URL: postgres://telemedhub:telemedhub_secret@postgres:5432/telemedhub?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_secret
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: telemedhub
      JWT_SECRET: dev-only-change-me-to-a-32-byte-secret
      SHUTDOWN_TIMEOUT_SECONDS: 15
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    container_name: telemedhub_postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: telemedhub
      POSTGRES_PASSWORD: telemedhub_secret
      POSTGRES_DB: telemedhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemedhub -d telemedhub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    container_name: telemedhub_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    container_name: telemedhub_minio
    image: minio/minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
